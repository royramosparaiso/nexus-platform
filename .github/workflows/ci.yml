name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout nexus-core sibling
        uses: actions/checkout@v4
        with:
          repository: royramosparaiso/nexus-core
          path: nexus-core
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ./nexus-core/python
          pip install -e ".[dev]" aiosqlite

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q

  build-image:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout nexus-core into vendor/
        uses: actions/checkout@v4
        with:
          repository: royramosparaiso/nexus-core
          path: vendor/nexus-core
          ref: main

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/royramosparaiso/nexus-platform:0.6.0
            ghcr.io/royramosparaiso/nexus-platform:latest
